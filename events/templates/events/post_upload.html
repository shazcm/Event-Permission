{% extends "base.html" %}

{% block title %}Post Event Upload{% endblock %}
{% block page_title %}Post Event Upload{% endblock %}
{% block page_subtitle %}{{ event.title }}{% endblock %}

{% block content %}
<section class="panel" style="max-width: 860px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <label for="attendance_file">Attendance File</label>
        <input id="attendance_file" type="file" name="attendance_file">

        <label for="images">Upload Photos (Max 5)</label>
        <input id="images" type="file" name="images" multiple>

        <button class="btn" type="submit" name="generate_report">Generate Report</button>

        {% if event.report_text %}
            <h3>Generated Report</h3>
            <textarea name="report_text" rows="12">{{ event.report_text }}</textarea>
            <button class="btn" type="submit" name="submit_report">Submit Final Report</button>
        {% endif %}
    </form>
</section>
{% endblock %}
