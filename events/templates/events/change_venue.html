{% load event_extras %}
<h2>Change Venue</h2>

{% if messages %}
    {% for message in messages %}
        <div style="color:red; margin:10px 0;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
<p>
    Event: <b>{{ event.title }}</b><br>
    Current Venue: {{ event.venue }}
</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Update Venue</button>
</form>
