<div class="filter-results-meta">Showing {{ events|length }} event{{ events|pluralize }}</div>

<section class="event-grid">
    {% for e in events %}
        <article class="event-card">
            {% include "events/partials/event_detail_card_body.html" with event=e %}

            <div class="action-row">
                <a class="btn secondary" href="{% url 'event_detail' e.id %}">View Details</a>
            </div>
        </article>
    {% empty %}
        <article class="no-results">
            <p style="margin:0 0 8px 0;font-weight:700;">No results found</p>
            <p class="muted" style="margin:0;">Try adjusting search text or clearing some filters.</p>
        </article>
    {% endfor %}
</section>
