<div class="muted" style="margin-bottom: 10px;">{{ events|length }} pending event{{ events|pluralize }}</div>

<section class="event-grid">
    {% for e in events %}
        <article class="event-card">
            {% include "events/partials/event_detail_card_body.html" with event=e %}

            <div class="action-row">
                <a class="btn secondary" href="{% url 'event_detail' e.id %}">View Details</a>
                <form method="post" action="{% url 'principal_event_action' e.id 'approve' %}">
                    {% csrf_token %}
                    <button class="btn" type="submit">Approve</button>
                </form>
                <button
                    type="button"
                    class="btn danger"
                    data-reject-trigger
                    data-reject-url="{% url 'principal_event_action' e.id 'reject' %}"
                    data-event-title="{{ e.title|escape }}"
                >
                    Reject
                </button>
            </div>
        </article>
    {% empty %}
        <article class="event-card"><p class="muted" style="margin:0;">No pending events.</p></article>
    {% endfor %}
</section>
