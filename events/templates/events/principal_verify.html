<h2>Completed Events — Pending Verification</h2>
{% load event_extras %}
{% for e in events %}
    <hr>
    <a href="{% url 'event_detail' e.id %}">{{ e.title }}</a><br>
    Category: {{ e.category }}<br>
    Department: {{ e.department }}<br>
    Date & Time :{{ e|format_event_datetime }}<br>
    Venue: {{ e.venue }}<br>


    {% if e.photo %}
        <img src="{{ e.photo.url }}" width="200"><br>
    {% endif %}


{% empty %}
    No events to verify.
{% endfor %}
