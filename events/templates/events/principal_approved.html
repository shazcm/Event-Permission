{% load event_extras %}
<h2>Approved Events</h2>
<hr>

{% for e in approved_events %}

    <a href="{% url 'event_detail' e.id %}">
    <b>{{ e.title }}</b>
    </a> —
    {{ e.department }} —
    {{ e.venue }} —
    {{ e.category }} —
    {{ e.participation_type }} —
    {{ e|format_event_datetime }}

    <a href="{% url 'change_event_venue' e.id %}">
        <button>Change Venue</button>
    </a>

    <br><br>

{% empty %}
    No approved events.
{% endfor %}
